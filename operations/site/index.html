            font-weight: bold;
        }
        .status.confirmed {
            background-color: #1f6feb;
            color: #f0f6fc;
        }
        .status.failed {
            background-color: #da3633;
            color: #f0f6fc;
        }
        .topics-list {
            margin: 10px 0;
            padding-left: 20px;
            color: #8b949e;
        }
        .footer-info {
            font-size: 0.9em;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
        }
        a {
            color: #58a6ff;
            text-decoration: none;
        }
        a:hover {

        }
